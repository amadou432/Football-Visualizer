<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>SoccerVisualizer</title>
</head>
<body>

    <nav>
        <div class="nav-content">
            <span class="logo"><img src="{{ url_for('static', filename='logo.png') }}" alt=""> SoccerVisualizer</span>
            <div class="nav-links">
                <a href="/" class="nav-item active">Home</a>
            </div>
        </div>
    </nav>

    <div class="league-filter-container">
        <div class="league-filter-bar">
            <button class="filter-btn active" onclick="filterLeague('all', this)">Tout</button>
            <button class="filter-btn" onclick="filterLeague('Premier League', this)">Premier League</button>
            <button class="filter-btn" onclick="filterLeague('Ligue 1', this)">Ligue 1</button>
            <button class="filter-btn" onclick="filterLeague('La Liga', this)">La Liga</button>
            <button class="filter-btn" onclick="filterLeague('Serie A', this)">Serie A</button>
            <button class="filter-btn" onclick="filterLeague('Bundesliga', this)">Bundesliga</button>
        </div>
    </div>

    <main class="container">
        <header class="page-header">
            <h1>Matchs du jour</h1>
        </header>

        <div class="match-grid" id="matchGrid">
            {% for m in matchs %}
            <a href="/match/{{ m.id }}" class="match-card" data-league="{{ m.league_name }}">
                <div class="league-tag">{{ m.league_name }}</div>
                <div class="match-content">
                    <div class="team">
                        <img src="{{ m.home_logo }}" alt="{{ m.home_name }}">
                        <span>{{ m.home_name }}</span>
                    </div>
                    <div class="score-area">
                        <span class="vs">VS</span>
                        <span class="time">{{ m.heure }}</span>
                    </div>
                    <div class="team">
                        <img src="{{ m.away_logo }}" alt="{{ m.away_name }}">
                        <span>{{ m.away_name }}</span>
                    </div>
                </div>
                <div class="confidence">
                    <span class="confidence-label">Confiance</span>
                    <div class="confidence-bar">
                        <div class="confidence-fill" style="width: {{ m.confidence if m.confidence else 0 }}%"></div>
                    </div>
                    <span class="confidence-value">{{ m.confidence if m.confidence else 0 }}/100</span>
                </div>
            </a>
            {% else %}
            <div class="empty-state">
                <p>Aucun match disponible pour le moment.</p>
            </div>
            {% endfor %}
        </div>

    </main>

    <script>
        // =============================
        // FILTRE PAR CHAMPIONNAT
        // =============================
        function filterLeague(league, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            document.querySelectorAll('.match-card').forEach(card => {
                if (league === 'all' || card.dataset.league === league) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }
    </script>

</body>
</html>
